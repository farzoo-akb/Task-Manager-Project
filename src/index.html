<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-linear-to-br from-slate-50 via-white to-brand-50 min-h-screen font-sans text-slate-800 custom-scroll">

<!-- ============ SIDEBAR (desktop) ============ -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white/90 backdrop-blur-xl border-r border-slate-200/60 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
  <!-- Logo -->
  <div class="p-6 flex items-center gap-3 border-b border-slate-100 ">
    <div class="w-9 h-9 rounded-xl bg-linear-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/25 bg-blue-700">
      <i class="fas fa-bolt text-white text-sm "></i>
    </div>
    <span class="text-lg font-bold bg-linear-to-r from-brand-600 to-brand-800 bg-clip-text text-transparent">TaskFlow</span>
  </div>

  <!-- Nav -->
  <nav class="flex-1 p-4 space-y-1 overflow-y-auto col-scroll">
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl bg-brand-50 text-brand-700 font-medium text-sm">
      <i class="fas fa-columns w-5 text-center"></i> Board View
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition text-sm">
      <i class="fas fa-list w-5 text-center"></i> List View
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition text-sm">
      <i class="fas fa-calendar-alt w-5 text-center"></i> Calendar
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition text-sm">
      <i class="fas fa-chart-pie w-5 text-center"></i> Analytics
    </a>

    <div class="pt-4 pb-2 px-4">
      <p class="text-[0.65rem] font-semibold text-slate-400 uppercase tracking-widest">Projects</p>
    </div>
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition text-sm">
      <span class="w-2.5 h-2.5 rounded-full bg-violet-400"></span> Marketing
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition text-sm">
      <span class="w-2.5 h-2.5 rounded-full bg-emerald-400"></span> Development
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-700 transition text-sm">
      <span class="w-2.5 h-2.5 rounded-full bg-amber-400"></span> Design
    </a>
  </nav>

  <!-- User -->
  <div class="p-4 border-t border-slate-100">
    <div class="flex items-center gap-3 px-3 py-2">
      <div class="w-9 h-9 rounded-full bg-linear-to-br from-brand-400 to-purple-500 flex items-center justify-center text-white text-sm font-bold shadow-md">A</div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-slate-700 truncate">Alex Rivera</p>
        <p class="text-xs text-slate-400 truncate">[email&#160;protected]</p>
      </div>
      <button class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-cog text-sm"></i></button>
    </div>
  </div>
</aside>

<!-- Sidebar overlay mobile -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

<!-- ============ MAIN ============ -->
<main class="lg:ml-64 min-h-screen flex flex-col">

  <!-- ====== STICKY HEADER ====== -->
  <header class="sticky top-0 z-20 glass border-b border-slate-200/50">
    <div class="px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-4">
      <!-- Menu -->
      <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition">
        <i class="fas fa-bars text-slate-500"></i>
      </button>

      <!-- Search -->
      <div class="relative flex-1 max-w-md">
        <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input type="text" placeholder="Search tasks..." oninput="filterTasks()" class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition" />
      </div>

      <!-- Right side -->
      <div class="flex items-center gap-2">
        <button class="relative w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition group">
          <i class="fas fa-bell text-slate-400 group-hover:text-slate-600 transition"></i>
          <span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-[0.6rem] text-white font-bold flex items-center justify-center border-2 border-white">3</span>
        </button>
        <button onclick="openModal()" class="hidden sm:flex items-center gap-2 px-4 py-2.5  bg-blue-700 rounded-xl bg-linear-to-r from-brand-500 to-brand-600 text-white text-sm font-semibold shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 hover:from-brand-600 hover:to-brand-700 transition-all active:scale-[0.97]">
          <i class="fas fa-plus text-xs"></i> New Task
        </button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="px-4 sm:px-6 lg:px-8 pb-3 flex items-center gap-3 overflow-x-auto custom-scroll">
      <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 shrink-0">
        <span class="w-2 h-2 rounded-full bg-amber-400"></span>
        <span class="text-xs font-medium text-slate-500">To Do</span>
        <span class="text-xs font-bold text-slate-700 bg-slate-100 rounded-md px-1.5 py-0.5">0</span>
      </div>
      <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 shrink-0">
        <span class="w-2 h-2 rounded-full bg-blue-400"></span>
        <span class="text-xs font-medium text-slate-500">In Progress</span>
        <span class="text-xs font-bold text-slate-700 bg-slate-100 rounded-md px-1.5 py-0.5">0</span>
      </div>
      <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 shrink-0">
        <span class="w-2 h-2 rounded-full bg-violet-400"></span>
        <span class="text-xs font-medium text-slate-500">Review</span>
        <span class="text-xs font-bold text-slate-700 bg-slate-100 rounded-md px-1.5 py-0.5">0</span>
      </div>
      <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-1.5 shrink-0">
        <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
        <span class="text-xs font-medium text-slate-500">Done</span>
        <span class="text-xs font-bold text-slate-700 bg-slate-100 rounded-md px-1.5 py-0.5">0</span>
      </div>
    </div>
  </header>

  <!-- ====== KANBAN BOARD ====== -->
  <section class="flex-1 px-4 sm:px-6 lg:px-8 py-6">
    <div id="kanban" class="flex kanban-cols gap-5 items-start">
      <!-- Task columns and cards will be static placeholders here -->
    </div>
  </section>

  <!-- Mobile FAB -->
  <button onclick="openModal()" class="sm:hidden fixed bottom-6 right-6 w-14 h-14 rounded-2xl bg-linear-to-br from-brand-500 to-brand-700 text-white shadow-2xl shadow-brand-600/40 flex items-center justify-center text-xl z-20 hover:scale-105 active:scale-95 transition-transform">
    <i class="fas fa-plus"></i>
  </button>
</main>

<!-- ============ ADD / EDIT TASK MODAL ============ -->
<div id="taskModal" class="fixed inset-0 z-50 hidden">
  <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0" onclick="closeModal()"></div>
  <div class="modal-content absolute inset-0 flex items-center justify-center p-4 opacity-0 translate-y-4 scale-[0.97]">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto col-scroll">
      <!-- Modal header -->
      <div class="sticky top-0 bg-white rounded-t-2xl px-6 pt-6 pb-4 border-b border-slate-100 flex items-center justify-between z-10">
        <h2 id="modalTitle" class="text-lg font-bold text-slate-800">New Task</h2>
        <button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center transition"><i class="fas fa-times text-slate-400"></i></button>
      </div>
      <!-- Form -->
      <form id="taskForm" onsubmit="saveTask(event)" class="p-6 space-y-5">
        <input type="hidden" id="taskId" />

        <!-- Title -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Title <span class="text-red-400">*</span></label>
          <input type="text" id="taskTitle" required placeholder="What needs to be done?" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition" />
        </div>

        <!-- Description -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description</label>
          <textarea id="taskDesc" rows="3" placeholder="Add details..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition resize-none"></textarea>
        </div>

        <!-- Row: Status + Priority -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Status</label>
            <select id="taskStatus" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition appearance-none cursor-pointer">
              <option value="todo">To Do</option>
              <option value="progress">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Priority</label>
            <select id="taskPriority" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition appearance-none cursor-pointer">
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
        </div>

        <!-- Row: Due Date + Tag -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"><i class="far fa-calendar-alt mr-1 text-brand-400"></i>Due Date</label>
            <input type="date" id="taskDue" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5"><i class="fas fa-tag mr-1 text-brand-400"></i>Tag</label>
            <select id="taskTag" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-400 transition appearance-none cursor-pointer">
              <option value="">None</option>
              <option value="frontend">Frontend</option>
              <option value="backend">Backend</option>
              <option value="design">Design</option>
              <option value="marketing">Marketing</option>
              <option value="bug">Bug Fix</option>
              <option value="feature">Feature</option>
            </select>
          </div>
        </div>

        <!-- Assignee -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Assignee</label>
          <div class="flex gap-2 flex-wrap">
            <label class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 cursor-pointer hover:border-brand-300 has-:checked:border-brand-400 has-:checked:bg-brand-50 transition text-sm">
              <input type="radio" name="assignee" value="Alex" class="sr-only" checked /> <span class="w-6 h-6 rounded-full bg-linear-to-br from-brand-400 to-purple-500 flex items-center justify-center text-white text-[0.6rem] font-bold">A</span> Alex
            </label>
            <label class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 cursor-pointer hover:border-brand-300 has-:checked:border-brand-400 has-:checked:bg-brand-50 transition text-sm">
              <input type="radio" name="assignee" value="Sam" class="sr-only" /> <span class="w-6 h-6 rounded-full bg-linear-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-[0.6rem] font-bold">S</span> Sam
            </label>
            <label class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 cursor-pointer hover:border-brand-300 has-:checked:border-brand-400 has-:checked:bg-brand-50 transition text-sm">
              <input type="radio" name="assignee" value="Jordan" class="sr-only" /> <span class="w-6 h-6 rounded-full bg-linear-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white text-[0.6rem] font-bold">J</span> Jordan
            </label>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2.5 bg-blue-700 rounded-xl bg-linear-to-r from-brand-500 to-brand-600 text-white text-sm font-semibold shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 transition active:scale-[0.97]" id="modalSubmit">Create Task</button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- ============ DELETE CONFIRM MODAL ============ -->
<div id="deleteModal" class="fixed inset-0 z-50 hidden">
  <div class="modal-overlay absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0" onclick="closeDeleteModal()"></div>
  <div class="modal-content absolute inset-0 flex items-center justify-center p-4 opacity-0 translate-y-4 scale-[0.97]">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
      <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-trash-alt text-red-500 text-xl"></i>
      </div>
      <h3 class="text-lg font-bold text-slate-800 mb-1">Delete Task?</h3>
      <p class="text-sm text-slate-500 mb-6">This action cannot be undone.</p>
      <div class="flex gap-3">
        <button onclick="closeDeleteModal()" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">Cancel</button>
        <button onclick="confirmDelete()" class="flex-1 px-4 py-2.5 rounded-xl bg-red-500 text-white text-sm font-semibold hover:bg-red-600 transition">Delete</button>
      </div>
    </div>
  </div>
</div>
     
<script src="app.js"></script>

</body>
</html>
